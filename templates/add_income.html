<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Income | Quantum Ledger</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Specific overrides for this page if needed */
        h1 {
            color: var(--accent-yellow);
            border-bottom: 2px solid var(--accent-green);
            padding-bottom: 10px;
            margin-bottom: 30px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Log New Income</h1>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form action="{{ url_for('add_income') }}" method="POST">

            <label for="amount">Amount *</label>
            <input type="number" id="amount" name="amount" step="0.01" placeholder="0.00" required>

            <label for="currency">Currency * (The amount above is in...)</label>
            <select id="currency" name="currency">
                {% for code, info in currencies.items() %}
                <option value="{{ code }}" {% if code=='INR' %}selected{% endif %}>
                    {{ info.symbol }} - {{ info.name }}
                </option>
                {% endfor %}
            </select>

            <label for="source">Source *</label>
            <select id="source" name="source">
                {% for src in sources %}
                <option value="{{ src }}">{{ src }}</option>
                {% endfor %}
            </select>

            <label for="date">Date *</label>
            <input type="date" id="date" name="date" value="{{ today }}" required>

            <button type="submit" class="submit-btn green-btn">Save Income</button>

            <div style="margin-top: 20px; text-align: center;">
                <a href="{{ url_for('dashboard') }}"
                    style="color: var(--text-secondary); text-decoration: none;">Cancel</a>
            </div>
        </form>
    </div>

</body>

</html>
